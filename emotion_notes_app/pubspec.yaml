name: emotion_notes_app
description: 情绪便利贴 - 情侣情绪管理应用
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI组件
  cupertino_icons: ^1.0.2
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  http: ^1.1.0
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 动画
  lottie: ^3.0.0
  
  # 路由
  go_router: ^13.0.0
  
  # 图片选择
  image_picker: ^1.0.7
  
  # 音频播放
  audioplayers: ^5.2.1
  
  # 音频录制
  record: ^6.2.0
  
  # 日期格式化
  intl: ^0.18.1
  
  # 路径处理
  path_provider: ^2.1.2

  # 应用更新
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.0
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # 资源文件
  assets:
    - assets/images/
    - assets/animations/
    - assets/models/
    - assets/music/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "icon.png"